name: Release

# Triggered when a semver tag (v0.3.0, 0.3.0, etc.) is pushed.
# Updates manifest.json version to match the tag, then creates a GitHub release.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/cantera/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${{ steps.version.outputs.version }}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/cantera/manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json already at ${{ steps.version.outputs.version }}"
          else
            git commit -m "chore: bump manifest version to ${{ steps.version.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
